name: Archive Myrient Full Site
on: 
  workflow_dispatch:

jobs:
  archive_job:
    runs-on: ubuntu-latest
    # أعطيناه أقصى مدة مسموحة (6 ساعات) لأن الموقع ضخم جداً
    timeout-minutes: 360 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install requests beautifulsoup4 tqdm

      - name: Start Full Scraping
        # سيقوم بتشغيل كود الزحف الشامل للموقع
        run: python scraper.py

      - name: Upload Complete Backup
        uses: actions/upload-artifact@v4
        with:
          # هذا هو الاسم الذي ستجده عند التحميل غداً
          name: Myrient-Full-Archive
          # يجب أن يطابق اسم ملف الـ ZIP الذي ينشئه كود البايثون
          path: Myrient_Complete_Backup.zip
          retention-days: 5
