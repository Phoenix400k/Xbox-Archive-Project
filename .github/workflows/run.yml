name: Non-Stop Archive Bot
on: 
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # تشغيل آلي كل 5 ساعات

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300 # التوقف الإجباري بعد 5 ساعات للحفظ بسلام
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Save Progress to GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add progress.txt
          git commit -m "حفظ التقدم التلقائي [skip ci]" || echo "لا توجد تغييرات"
          git push

      - name: Upload Zip Archive
        uses: actions/upload-artifact@v4
        with:
          name: Myrient-Archive-Part
          path: Myrient_Complete_Backup.zip
          retention-days: 1
